spring.application.name=haras-backend

# Importa variaveis de um arquivo .env na raiz do backend (opcional: nao falha se nao existir)
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:haras_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

# JWT (segredo deve ter >= 32 bytes para HS256; sobrescreva via .env em producao)
security.jwt.secret=${JWT_SECRET:troque-este-segredo-de-desenvolvimento-haras-db-0123456789}
# Validade do token em milissegundos (padrao: 8 horas)
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}
